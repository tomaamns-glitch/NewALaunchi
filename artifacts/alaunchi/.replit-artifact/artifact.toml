kind = "web"
previewPath = "/"
title = "ALaunchi"
version = "1.0.0"
id = "artifacts/alaunchi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23733

[services.development]
run = "pnpm --filter @workspace/alaunchi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alaunchi", "run", "build" ]
publicDir = "artifacts/alaunchi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23733"
BASE_PATH = "/"
